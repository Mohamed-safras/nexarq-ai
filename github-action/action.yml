name: 'Nexarq Code Review'
description: 'multi-agent AI code review platform'
author: 'Nexarq'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  provider:
    description: 'LLM provider: anthropic | openai | google | minimax | ollama'
    required: false
    default: 'google'

  anthropic-api-key:
    description: 'Anthropic API key (required if provider=anthropic)'
    required: false

  openai-api-key:
    description: 'OpenAI API key (required if provider=openai)'
    required: false

  google-api-key:
    description: 'Google API key (required if provider=google)'
    required: false

  minimax-api-key:
    description: 'MiniMax API key (required if provider=minimax)'
    required: false

  model:
    description: 'Model override (e.g. claude-haiku-4-5-20251001, gpt-4o-mini, gemini-2.5-flash)'
    required: false
    default: ''

  mode:
    description: 'Review mode: fast | smart | deep'
    required: false
    default: 'smart'

  agents:
    description: 'Comma-separated agent names to run (default: auto-select by diff)'
    required: false
    default: ''

  fail-on:
    description: 'Fail the action if findings at this severity or higher are found: critical | high | medium | none'
    required: false
    default: 'high'

  post-comment:
    description: 'Post findings as a GitHub PR review comment'
    required: false
    default: 'true'

  github-token:
    description: 'GitHub token for posting PR comments (auto-provided by GitHub)'
    required: false
    default: ${{ github.token }}

outputs:
  findings-count:
    description: 'Total number of findings across all agents'

  critical-count:
    description: 'Number of CRITICAL severity findings'

  high-count:
    description: 'Number of HIGH severity findings'

  summary:
    description: 'JSON summary of the review run'

runs:
  using: 'node20'
  main: 'dist/index.js'
